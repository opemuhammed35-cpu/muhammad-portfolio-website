<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kamaldeen Muhammad | Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio of Kamaldeen Muhammad - Software Engineer, Web & App Developer, and UI/UX Designer.">
  <meta name="keywords" content="Kamaldeen Muhammad, portfolio, web developer, software engineer, UI UX designer, frontend, backend, Nigeria, fullstack">
  <meta name="author" content="Kamaldeen Muhammad">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- QRCode.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    /* ===== Global Reset ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #000; color: #ccc; font-family: Arial, sans-serif; line-height: 1.6; }

    /* ===== Header & Navigation ===== */
    header { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 15px 20px; position: sticky; top: 0; z-index: 1000; }
    header h1 { font-size: 22px; color: #00aaff; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { text-decoration: none; font-size: 18px; color: lightblue; transition: color 0.3s ease; }
    .nav-links a:hover { color: #fff; }

    /* ===== Hamburger Menu ===== */
    .hamburger { font-size: 28px; background: none; border: none; color: white; cursor: pointer; z-index: 1100; }
    .nav-links { 
      position: fixed; top: 0; right: -300px; height: 100%; width: 250px; 
      flex-direction: column; background: #111; padding: 50px 20px; 
      gap: 20px; transition: right 0.3s ease-in-out;
    }
    .nav-links.show { right: 0; }

    /* ===== Hero Section ===== */
    .typing { border-right: 2px solid #00ffcc; white-space: nowrap; overflow: hidden; width: fit-content; animation: blinkCursor 0.8s step-end infinite; font-size: 30px; color: lightblue; margin: 20px 0; }
    @keyframes blinkCursor { 50% { border-color: transparent; } }

    .container { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; padding: 40px 20px; gap: 20px; }
    .text { flex: 1 1 300px; font-size: 20px; color: #fff; }
    .text button { margin-top: 15px; padding: 10px 20px; border: none; background: #00aaff; color: white; border-radius: 5px; cursor: pointer; transition: background 0.3s ease; }
    .text button:hover { background: green; }
    .image img { width: 250px; height: 250px; border-radius: 50%; border: 4px solid lightblue; }

    /* ===== About Section ===== */
    .abt { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start; background: #111; padding: 30px; border-radius: 12px; margin: 30px 0; }
    .prof img { width: 250px; height: 250px; border-radius: 10px; border: 3px solid #00aaff; }
    .who { font-size: 18px; max-width: 600px; color: #ddd; }

    /* ===== Skills Section ===== */
    .filter-buttons { margin-bottom: 20px; text-align: center; }
    .filter-buttons button { margin: 5px; padding: 10px 20px; border: none; background: #444; color: white; border-radius: 5px; cursor: pointer; transition: background 0.3s ease; }
    .filter-buttons button.active, .filter-buttons button:hover { background: #007bff; }
    .skills-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
    .skill { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; border: 2px solid #ddd; border-radius: 10px; background: white; transition: transform 0.3s ease, background 0.3s ease; }
    .skill img { max-width: 60%; max-height: 60%; }
    .skill:hover { transform: scale(1.1); background: #f5f5f5; }

    /* ===== Services Section ===== */
    #services { padding: 30px 20px; background: #111; margin: 30px 0; }
    #services h4 { text-align: center; color: #00aaff; margin-bottom: 20px; }
    .services-container, .projects-container { display: flex; gap: 15px; overflow-x: auto; scroll-behavior: smooth; padding-bottom: 10px; }
    .service-box, .project { flex: 0 0 250px; background: #222; color: white; padding: 20px; border-radius: 10px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; text-align: center; box-shadow: 0 0 10px #000; transition: transform 0.3s ease; }
    .service-box h5, .project h3 { margin-bottom: 10px; color: #00aaff; }
    .service-box p, .project p { font-size: 14px; color: #ccc; }
    .project img { border-radius: 8px; margin-bottom: 10px; max-width: 100%; }

    /* ===== CV Section ===== */
    .cv-section { display: flex; gap: 30px; align-items: center; justify-content: center; background: #111; padding: 30px; border-radius: 12px; margin-top: 40px; flex-wrap: wrap; }
    .cv-section div { text-align: center; }
    .cv-section button { display: block; margin: 10px auto; padding: 10px 20px; border: none; border-radius: 5px; background: #00aaff; color: #fff; cursor: pointer; transition: background 0.3s ease; }
    .cv-section button:hover { background: green; }

    /* ===== Footer ===== */
    footer { text-align: center; padding: 20px; background: #111; margin-top: 40px; color: #aaa; }
    .social-links { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
    .social-links a { color: #00aaff; font-size: 28px; transition: transform 0.3s ease, color 0.3s ease; }
    .social-links a:hover { color: #00ffcc; transform: scale(1.2); }

    /* ===== Responsive ===== */
    @media (max-width:768px){
      .container,.abt { flex-direction: column; text-align:center; }
      .contact-container { flex-direction: column; }
      .image img,.prof img { width: 200px;height: 200px; }
      .service-box,.project { flex:0 0 200px; }
      .cv-section { flex-direction: column; }
      .nav-links { width: 200px; padding: 60px 15px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Hi, I'm Muhammad</h1>
  <button class="hamburger" id="hamburger">☰</button>
  <nav class="nav-links" id="nav-links">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#services">Services</a>
    <a href="#projects">Projects</a>
    <a href="resume of kamal.pdf" download>Download CV</a>
    <a href="#contact">Hire Me</a>
  </nav>
</header>

<main>
  <!-- Hero, About, Skills, Services, Projects sections remain same as your original code -->

  <!-- CV Section -->
  <section class="cv-section">
    <div>
      <h4>Download My CV</h4>
      <button onclick="window.open('resume of kamal.pdf', '_blank')">Download CV</button>
      <button onclick="copyCV()">Copy CV Link</button>
    </div>
    <div id="qrcode"></div>
  </section>

</main>

<footer>
  <div class="social-links">
    <a href="https://wa.me/2348140295116" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.facebook.com/profile.php?id=61583195955596" target="_blank"><i class="fab fa-facebook-f"></i></a>
    <a href="mailto:opemuhammed35@gmail.com"><i class="fas fa-envelope"></i></a>
    <a href="https://www.instagram.com/kamaldeenmuhammad11" target="_blank"><i class="fab fa-instagram"></i></a>
  </div>
  <p>&copy; 2025 Kamaldeen Muhammad. All rights reserved.</p>
</footer>
<script>
  // ===== Hamburger Menu =====
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('nav-links');

  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('show');
    // toggle hamburger to X
    if(navLinks.classList.contains('show')){
      hamburger.textContent = '✖';
    } else {
      hamburger.textContent = '☰';
    }
  });

  // ===== Typing Effect =====
  const typingElement = document.getElementById('typing');
  const words = ["I'm a Software Engineer.", "I build Web Apps.", "I create Scalable Solutions."];
  let wordIndex = 0, charIndex = 0;

  function type(){
    if(charIndex < words[wordIndex].length){
      typingElement.textContent += words[wordIndex][charIndex++];
      setTimeout(type, 100);
    } else {
      setTimeout(erase, 1500);
    }
  }

  function erase(){
    if(charIndex > 0){
      typingElement.textContent = words[wordIndex].substring(0, --charIndex);
      setTimeout(erase, 50);
    } else {
      wordIndex = (wordIndex + 1) % words.length;
      setTimeout(type, 500);
    }
  }

  type();

  // ===== Skills Filter =====
  const filterButtons = document.querySelectorAll('.filter-buttons button');
  const skills = document.querySelectorAll('.skill');

  filterButtons.forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      document.querySelector('.filter-buttons .active').classList.remove('active');
      btn.classList.add('active');
      const filter = btn.getAttribute('data-filter');
      skills.forEach(skill => {
        if(filter==='all' || skill.classList.contains(filter)){
          skill.style.display='flex';
        } else {
          skill.style.display='none';
        }
      });
    });
  });

  // ===== QR Code =====
  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/resume of kamal.pdf",
    width: 150,
    height: 150,
    colorDark : "#00aaff",
    colorLight : "#000000",
    correctLevel : QRCode.CorrectLevel.H
  });

  // ===== Copy CV Link =====
  function copyCV() {
    const cvLink = window.location.origin + "/resume of kamal.pdf";
    navigator.clipboard.writeText(cvLink)
      .then(() => alert("CV link copied to clipboard!"))
      .catch(err => console.error("Failed to copy:", err));
  }
       </script>
